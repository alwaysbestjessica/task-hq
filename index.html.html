<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>任務指揮台</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#f0f5f2;--surface:#ffffff;--s2:#e8f0ec;--border:#ccddd4;
  --gold:#7a9e6e;--red:#c0504a;--green:#4a9b6f;--blue:#3d86b0;--orange:#c07840;--purple:#7868a8;
  --text:#1e2d24;--dim:#5a7a68;--faint:#b8d0c4;--r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:700;color:var(--gold)}
.logo span{color:var(--dim);font-weight:400;font-size:11px;margin-left:8px}
.hdate{font-size:11px;color:var(--dim)}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:10px 12px;font-size:12px;font-weight:500;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;flex-shrink:0}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.pg{display:none;flex:1;padding:16px;max-width:700px;margin:0 auto;width:100%}
.pg.on{display:block}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
.clabel{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:10px}

/* Capture */
.crow{display:flex;gap:8px;align-items:flex-start}
#cinput{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:14px;padding:10px 12px;resize:none;min-height:44px;max-height:110px;font-family:inherit;line-height:1.5;outline:none;transition:border-color .2s}
#cinput:focus{border-color:var(--gold)}
#cinput::placeholder{color:var(--faint)}
.bicon{width:44px;height:44px;border:none;border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;flex-shrink:0}
.bvoice{background:var(--s2);color:var(--dim);border:1px solid var(--border)}
.bvoice.rec{background:#fce8e8;color:var(--red);border-color:var(--red);animation:pulse 1s infinite}
.badd{background:var(--gold);color:#1e2d24;font-size:22px;font-weight:300}
.badd:hover{background:#f5c84a}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.prow{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center}
.pill{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;user-select:none}
.pr{background:#fce8e8;color:var(--red);border-color:#3d2020}
.py{background:#faf0d8;color:var(--gold);border-color:#3d2e10}
.pg2{background:var(--s2);color:var(--dim);border-color:var(--border)}
.pill.sel-r{background:#f5c0c0;border-color:var(--red)}
.pill.sel-y{background:#f5ecd0;border-color:var(--gold)}
.pill.sel-g{background:#2a3347;border-color:#4a5a7a;color:var(--text)}

/* Date inputs inline */
.date-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.date-field{display:flex;flex-direction:column;gap:3px;flex:1;min-width:130px}
.date-field label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.date-field input[type=date]{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:12px;padding:7px 10px;font-family:inherit;outline:none;width:100%;transition:border-color .2s}
.date-field input[type=date]:focus{border-color:var(--gold)}
.date-field input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5);cursor:pointer}

/* Stats */
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px;text-align:center}
.snum{font-size:22px;font-weight:700;color:var(--gold)}
.slbl{font-size:11px;color:var(--dim);margin-top:2px}

/* Section */
.sh{display:flex;align-items:center;justify-content:space-between;margin:18px 0 8px}
.stitle{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);display:flex;align-items:center;gap:6px}
.badge{background:var(--s2);color:var(--dim);border-radius:20px;padding:1px 7px;font-size:11px}

/* Task item */
.titem{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px}
.titem.done{opacity:.4}
.titem.overdue{border-color:#5c2020}
.titem.due-soon{border-color:#4d3a10}
.tcheck{width:18px;height:18px;border:2px solid var(--border);border-radius:5px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer}
.tcheck.ck{background:var(--green);border-color:var(--green);color:#1e2d24;font-size:11px}
.tbody{flex:1;min-width:0}
.ttext{font-size:14px;line-height:1.5;word-break:break-word}
.titem.done .ttext{text-decoration:line-through;color:var(--dim)}
.tmeta{display:flex;gap:6px;margin-top:5px;align-items:center;flex-wrap:wrap}
.tdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dr{background:var(--red)}.dy{background:var(--gold)}.dg{background:var(--faint)}
.ttag{font-size:11px;padding:2px 7px;border-radius:4px;background:var(--s2);color:var(--dim)}
.ttime{font-size:11px;color:var(--faint)}
.date-tag{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;display:flex;align-items:center;gap:3px}
.dt-exec{background:#d8edf8;color:var(--blue);border:1px solid #1a3a50}
.dt-due{background:#faf0d8;color:var(--gold);border:1px solid #3d2e10}
.dt-overdue{background:#fce8e8;color:var(--red);border:1px solid #5c2020}
.dt-done{background:#d8f0e4;color:var(--green);border:1px solid #1a4a2a}
.align-badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.ab-yes{background:#d8f0e4;color:var(--green);border:1px solid #1a4a2a}
.ab-no{background:#fce4d4;color:var(--orange);border:1px solid #4a2a10}
.ab-na{background:var(--s2);color:var(--dim);border:1px solid var(--border)}
.align-note{font-size:12px;color:var(--dim);margin-top:6px;line-height:1.5;padding:6px 10px;background:var(--bg);border-radius:6px;border-left:2px solid var(--border)}
.tdel{width:24px;height:24px;border:none;background:transparent;color:var(--faint);cursor:pointer;border-radius:4px;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color .15s;padding:0;line-height:1}
.tdel:hover{color:var(--red)}
.empty{text-align:center;padding:30px 20px;color:var(--faint);font-size:13px;line-height:2}

/* Buttons */
.bprimary{background:var(--gold);color:#1e2d24;border:none;border-radius:var(--rs);padding:11px 20px;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:10px;transition:background .2s;font-family:inherit}
.bprimary:hover{background:#f5c84a}
.bprimary:disabled{opacity:.4;cursor:not-allowed}
.bsec{background:var(--s2);color:var(--text);border:1px solid var(--border);border-radius:var(--rs);padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.bsec:hover{border-color:var(--gold);color:var(--gold)}
.bsm{background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.bsm:hover{border-color:var(--gold);color:var(--gold)}
.bdanger{background:transparent;border:1px solid #3d2020;color:var(--red);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit}

/* Analysis */
.abox{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-top:14px;display:none}
.abox.vis{display:block}
.abox h3{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:12px}
.atext{font-size:13px;line-height:1.9;color:var(--text);white-space:pre-wrap}
.dots span{animation:blink 1.2s infinite;font-size:18px;color:var(--gold)}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}

/* Goals */
.goal-tabs{display:flex;gap:6px;margin-bottom:16px}
.gtab{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--dim);background:var(--s2);transition:all .2s}
.gtab.on{background:#faf0d8;color:var(--gold);border-color:var(--gold)}
.goal-section{display:none}.goal-section.on{display:block}
.gitem{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.gitem.disabled{opacity:.45}
.gtoggle{width:32px;height:18px;background:var(--faint);border-radius:9px;cursor:pointer;position:relative;flex-shrink:0;margin-top:2px;transition:background .2s;border:none}
.gtoggle::after{content:'';position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s}
.gtoggle.on{background:var(--green)}.gtoggle.on::after{transform:translateX(14px)}
.gbody{flex:1;min-width:0}
.gtext{font-size:13px;line-height:1.5;word-break:break-word}
.gitem.disabled .gtext{color:var(--dim)}
.glayer{font-size:11px;color:var(--dim);margin-top:3px}
.gactions{display:flex;gap:6px;margin-top:8px}
.add-goal-form{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:12px;margin-bottom:12px}
.add-goal-form textarea{width:100%;background:transparent;border:none;color:var(--text);font-size:13px;font-family:inherit;resize:none;outline:none;line-height:1.6;min-height:60px}
.add-goal-form textarea::placeholder{color:var(--faint)}
.form-row{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap}
.form-row select{background:var(--s2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 10px;font-size:12px;font-family:inherit;outline:none;cursor:pointer}
.vitem{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px}
.vdate{font-size:12px;color:var(--gold);font-weight:600}
.vchanges{font-size:12px;color:var(--dim);line-height:1.9;margin-top:6px}
.vc-add{color:var(--green)}.vc-edit{color:var(--blue)}.vc-del{color:var(--red)}.vc-toggle{color:var(--orange)}
.gedit-input{width:100%;background:var(--bg);border:1px solid var(--gold);border-radius:6px;color:var(--text);font-size:13px;font-family:inherit;padding:6px 10px;outline:none;resize:none;min-height:50px;line-height:1.5}

/* ── HISTORY PAGE ── */
.hist-tabs{display:flex;gap:6px;margin-bottom:16px}
.htab{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--dim);background:var(--s2);transition:all .2s}
.htab.on{background:#0d2210;color:var(--green);border-color:var(--green)}

/* Progress bar */
.prog-wrap{background:var(--faint);border-radius:4px;height:6px;width:100%;overflow:hidden;margin-top:4px}
.prog-bar{height:100%;border-radius:4px;background:var(--green);transition:width .4s}

/* Week card */
.week-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.week-title{font-size:13px;font-weight:600}
.week-rate{font-size:13px;font-weight:700;color:var(--green)}
.day-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-top:1px solid var(--faint)}
.day-label{font-size:12px;color:var(--dim);width:60px}
.day-tasks{font-size:11px;color:var(--text);flex:1;padding:0 8px}
.day-count{font-size:11px;color:var(--green);white-space:nowrap}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 20px;border-radius:24px;font-size:13px;font-weight:500;transition:transform .3s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>
<header>
  <div class="logo">任務指揮台 <span>Task HQ</span></div>
  <div class="hdate" id="hdate"></div>
</header>
<div class="tabs">
  <div class="tab on"  onclick="sw('tasks')">⚡ 任務</div>
  <div class="tab"     onclick="sw('analysis')">🧠 分析</div>
  <div class="tab"     onclick="sw('history')">📊 歷史</div>
  <div class="tab"     onclick="sw('goals')">🎯 目標</div>
</div>

<!-- ── TASKS ── -->
<div class="pg on" id="pg-tasks">
  <div class="card">
    <div class="clabel">新增任務</div>
    <div class="crow">
      <textarea id="cinput" placeholder="輸入任務，或按🎙️語音輸入…" rows="1"
        oninput="ar(this)" onkeydown="ke(event)"></textarea>
      <button class="bicon bvoice" id="vbtn" onclick="toggleVoice()">🎙️</button>
      <button class="bicon badd" onclick="addTask()">＋</button>
    </div>
    <div class="prow">
      <span class="pill pr"  id="p-urgent" onclick="selP('urgent')">🔴 今天必做</span>
      <span class="pill py"  id="p-week"   onclick="selP('week')">🟡 本週要做</span>
      <span class="pill pg2" id="p-later"  onclick="selP('later')">⚪ 有空再說</span>
    </div>
    <div class="date-row">
      <div class="date-field">
        <label>📅 執行日期</label>
        <input type="date" id="d-exec">
      </div>
      <div class="date-field">
        <label>⏰ 截止日期</label>
        <input type="date" id="d-due">
      </div>
    </div>
  </div>

  <div class="srow">
    <div class="scard"><div class="snum" id="s-urgent">0</div><div class="slbl">今天必做</div></div>
    <div class="scard"><div class="snum" id="s-week">0</div><div class="slbl">本週要做</div></div>
    <div class="scard"><div class="snum" id="s-done">0</div><div class="slbl">已完成</div></div>
  </div>

  <!-- Overdue alert -->
  <div id="overdue-alert" style="display:none;background:#fce8e8;border:1px solid var(--red);border-radius:var(--rs);padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--red)"></div>

  <div class="sh"><div class="stitle">🔴 今天必做 <span class="badge" id="b-urgent">0</span></div></div>
  <div id="l-urgent"></div>
  <div class="sh"><div class="stitle">🟡 本週要做 <span class="badge" id="b-week">0</span></div></div>
  <div id="l-week"></div>
  <div class="sh"><div class="stitle">⚪ 有空再說 <span class="badge" id="b-later">0</span></div></div>
  <div id="l-later"></div>
</div>

<!-- ── ANALYSIS ── -->
<div class="pg" id="pg-analysis">
  <div class="card">
    <div class="clabel">每日任務分析</div>
    <p style="font-size:13px;color:var(--dim);line-height:1.7;margin-bottom:12px">AI 對照啟用中的目標，逐一標記對齊狀況並給行動建議。</p>
    <div id="active-goals-preview"></div>
    <button class="bprimary" id="abtn" onclick="runAnalysis()">🧠 開始分析</button>
  </div>
  <div class="abox" id="abox"><h3>分析結果</h3><div class="atext" id="atext"></div></div>
</div>

<!-- ── HISTORY ── -->
<div class="pg" id="pg-history">
  <div class="hist-tabs">
    <div class="htab on" onclick="swHist('daily')">📅 每日完成</div>
    <div class="htab"    onclick="swHist('weekly')">📆 每週進度</div>
  </div>
  <div id="hs-daily" class="goal-section on"></div>
  <div id="hs-weekly" class="goal-section"></div>
</div>

<!-- ── GOALS ── -->
<div class="pg" id="pg-goals">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
    <div style="font-size:14px;font-weight:600">公司目標管理</div>
    <button class="bsec" onclick="showAddGoal()">＋ 新增目標</button>
  </div>
  <div class="add-goal-form" id="add-goal-form" style="display:none">
    <textarea id="new-goal-text" placeholder="輸入目標內容…" oninput="ar(this)"></textarea>
    <div class="form-row">
      <select id="new-goal-layer">
        <option value="annual">📅 年度目標</option>
        <option value="quarter">📆 季度重點</option>
      </select>
      <button class="bsm" onclick="confirmAddGoal()">確認新增</button>
      <button class="bsm" onclick="cancelAddGoal()">取消</button>
    </div>
  </div>
  <div class="goal-tabs">
    <div class="gtab on" onclick="swGoalTab('annual')">📅 年度目標</div>
    <div class="gtab"    onclick="swGoalTab('quarter')">📆 季度重點</div>
    <div class="gtab"    onclick="swGoalTab('ghistory')">🕓 版本紀錄</div>
  </div>
  <div class="goal-section on" id="gs-annual"><div id="gl-annual"></div></div>
  <div class="goal-section"    id="gs-quarter"><div id="gl-quarter"></div></div>
  <div class="goal-section"    id="gs-ghistory"><div id="gl-ghistory"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──
let tasks   = JSON.parse(localStorage.getItem('tq_tasks')   || '[]');
let goals   = JSON.parse(localStorage.getItem('tq_goals2')  || '[]');
let ghistory= JSON.parse(localStorage.getItem('tq_ghist')   || '[]');
let selPri  = 'urgent';
let recog   = null, isRec = false;
const TODAY = ()=> new Date().toISOString().split('T')[0];

window.onload = ()=>{
  document.getElementById('hdate').textContent =
    new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
  // default exec date = today
  document.getElementById('d-exec').value = TODAY();
  selP('urgent'); renderAll(); renderGoals(); updateAnalysisPreview();
};

const save  = ()=> localStorage.setItem('tq_tasks',  JSON.stringify(tasks));
const saveG = ()=>{ localStorage.setItem('tq_goals2', JSON.stringify(goals)); updateAnalysisPreview(); };
const saveGH= ()=> localStorage.setItem('tq_ghist',  JSON.stringify(ghistory));
function toast(msg,dur=2200){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),dur); }

// ── Tabs ──
function sw(t){
  ['tasks','analysis','history','goals'].forEach((n,i)=>{
    document.getElementById('pg-'+n).classList.toggle('on',n===t);
    document.querySelectorAll('.tab')[i].classList.toggle('on',n===t);
  });
  if(t==='analysis') updateAnalysisPreview();
  if(t==='history')  renderHistory();
}

// ── Priority ──
function selP(p){
  selPri=p;
  document.getElementById('p-urgent').className='pill pr' +(p==='urgent'?' sel-r':'');
  document.getElementById('p-week').className  ='pill py' +(p==='week'?  ' sel-y':'');
  document.getElementById('p-later').className ='pill pg2'+(p==='later'? ' sel-g':'');
}

// ── Add task ──
function addTask(){
  const el=document.getElementById('cinput');
  const txt=el.value.trim(); if(!txt) return;
  const execDate=document.getElementById('d-exec').value;
  const dueDate =document.getElementById('d-due').value;
  tasks.push({id:Date.now(), text:txt, priority:selPri, done:false,
    created:TODAY(), execDate, dueDate, completedDate:'',
    time:new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}),
    align:null, alignNote:''});
  save(); el.value=''; el.style.height='auto';
  document.getElementById('d-due').value='';
  document.getElementById('d-exec').value=TODAY();
  renderAll();
}
function ke(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addTask();} }
function ar(el){ el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }

// ── Date helpers ──
function daysUntil(dateStr){
  if(!dateStr) return null;
  const d=new Date(dateStr), now=new Date(TODAY());
  return Math.round((d-now)/(1000*60*60*24));
}
function fmtDate(dateStr){
  if(!dateStr) return '';
  const [y,m,d]=dateStr.split('-');
  return `${m}/${d}`;
}
function dueBadge(t){
  if(t.done) return `<span class="date-tag dt-done">✓ ${fmtDate(t.completedDate||t.dueDate)}</span>`;
  if(!t.dueDate) return '';
  const days=daysUntil(t.dueDate);
  if(days<0)  return `<span class="date-tag dt-overdue">⚠ 已逾期 ${Math.abs(days)}天</span>`;
  if(days===0) return `<span class="date-tag dt-overdue">⚠ 今天截止</span>`;
  if(days<=3)  return `<span class="date-tag dt-due">⏰ ${days}天後截止</span>`;
  return `<span class="date-tag dt-due">截止 ${fmtDate(t.dueDate)}</span>`;
}
function execBadge(t){
  if(!t.execDate) return '';
  return `<span class="date-tag dt-exec">📅 ${fmtDate(t.execDate)}</span>`;
}

// ── Render tasks ──
function renderAll(){
  const u=tasks.filter(t=>t.priority==='urgent'&&!t.done);
  const w=tasks.filter(t=>t.priority==='week'  &&!t.done);
  const l=tasks.filter(t=>t.priority==='later' &&!t.done);
  const d=tasks.filter(t=>t.done);
  document.getElementById('s-urgent').textContent=u.length;
  document.getElementById('s-week').textContent=w.length;
  document.getElementById('s-done').textContent=d.length;
  document.getElementById('b-urgent').textContent=u.length;
  document.getElementById('b-week').textContent=w.length;
  document.getElementById('b-later').textContent=l.length;
  rl('l-urgent',u); rl('l-week',w); rl('l-later',l);

  // overdue alert
  const overdue=tasks.filter(t=>!t.done&&t.dueDate&&daysUntil(t.dueDate)<0);
  const alertEl=document.getElementById('overdue-alert');
  if(overdue.length){
    alertEl.style.display='block';
    alertEl.textContent=`⚠ 有 ${overdue.length} 個任務已逾期，請盡快處理`;
  } else { alertEl.style.display='none'; }
}
function rl(id,items){
  const el=document.getElementById(id);
  if(!items.length){el.innerHTML='<div class="empty">暫無任務</div>';return;}
  // sort: overdue first, then by due date
  items.sort((a,b)=>{
    const da=a.dueDate?daysUntil(a.dueDate):999;
    const db=b.dueDate?daysUntil(b.dueDate):999;
    return da-db;
  });
  el.innerHTML=items.map(th).join('');
}
function th(t){
  const dc=t.priority==='urgent'?'dr':t.priority==='week'?'dy':'dg';
  const lbl=t.priority==='urgent'?'今天必做':t.priority==='week'?'本週':'有空';
  const days=t.dueDate?daysUntil(t.dueDate):null;
  const isOverdue=!t.done&&days!==null&&days<0;
  const isSoon=!t.done&&days!==null&&days>=0&&days<=3;
  let ab='',an='';
  if(t.align==='yes') ab='<span class="align-badge ab-yes">✓ 對齊</span>';
  else if(t.align==='no') ab='<span class="align-badge ab-no">⚠ 需調整</span>';
  if(t.alignNote) an=`<div class="align-note">${esc(t.alignNote)}</div>`;
  return `<div class="titem${t.done?' done':''}${isOverdue?' overdue':''}${isSoon?' due-soon':''}">
    <div class="tcheck${t.done?' ck':''}" onclick="tog(${t.id})">${t.done?'✓':''}</div>
    <div class="tbody">
      <div class="ttext">${esc(t.text)}</div>
      <div class="tmeta">
        <span class="tdot ${dc}"></span>
        <span class="ttag">${lbl}</span>
        ${execBadge(t)}${dueBadge(t)}${ab}
      </div>${an}
    </div>
    <button class="tdel" onclick="del(${t.id})">×</button>
  </div>`;
}

function tog(id){
  const t=tasks.find(x=>x.id===id); if(!t) return;
  t.done=!t.done;
  if(t.done) t.completedDate=TODAY();
  else t.completedDate='';
  save(); renderAll();
}
function del(id){ tasks=tasks.filter(x=>x.id!==id); save(); renderAll(); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Voice ──
function toggleVoice(){
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){alert('請使用 Chrome');return;}
  if(isRec){recog&&recog.stop();return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recog=new SR(); recog.lang='zh-TW'; recog.continuous=false; recog.interimResults=true;
  recog.onstart=()=>{isRec=true;document.getElementById('vbtn').classList.add('rec');toast('🎙️ 錄音中…說完後再按一次',99999);};
  recog.onresult=(e)=>{let f='',i='';for(let r of e.results){if(r.isFinal)f+=r[0].transcript;else i+=r[0].transcript;}const el=document.getElementById('cinput');el.value=f||i;ar(el);};
  recog.onend=()=>{isRec=false;document.getElementById('vbtn').classList.remove('rec');document.getElementById('toast').classList.remove('show');};
  recog.onerror=()=>{isRec=false;document.getElementById('vbtn').classList.remove('rec');document.getElementById('toast').classList.remove('show');};
  recog.start();
}

// ── HISTORY ──
function swHist(t){
  ['daily','weekly'].forEach((n,i)=>{
    document.getElementById('hs-'+n).classList.toggle('on',n===t);
    document.querySelectorAll('.htab')[i].classList.toggle('on',n===t);
  });
}

function renderHistory(){
  renderDaily(); renderWeekly();
}

function renderDaily(){
  const el=document.getElementById('hs-daily');
  // Group completed tasks by completedDate
  const done=tasks.filter(t=>t.done&&t.completedDate);
  const byDay={};
  done.forEach(t=>{
    if(!byDay[t.completedDate]) byDay[t.completedDate]=[];
    byDay[t.completedDate].push(t);
  });
  const dates=Object.keys(byDay).sort((a,b)=>b.localeCompare(a));
  if(!dates.length){el.innerHTML='<div class="empty">還沒有完成的任務紀錄</div>';return;}
  el.innerHTML=dates.map(date=>{
    const items=byDay[date];
    const d=new Date(date);
    const label=d.toLocaleDateString('zh-TW',{month:'long',day:'numeric',weekday:'short'});
    return `<div class="week-card">
      <div class="week-header">
        <span class="week-title">${label}</span>
        <span class="week-rate" style="color:var(--green)">完成 ${items.length} 項</span>
      </div>
      ${items.map(t=>`<div class="day-row">
        <span class="tdot ${t.priority==='urgent'?'dr':t.priority==='week'?'dy':'dg'}" style="margin-top:2px;flex-shrink:0"></span>
        <span class="day-tasks" style="padding-left:8px">${esc(t.text)}</span>
        <span class="day-count">${t.time}</span>
      </div>`).join('')}
    </div>`;
  }).join('');
}

function renderWeekly(){
  const el=document.getElementById('hs-weekly');
  // Get weeks in the past 8 weeks
  const weeks=[];
  for(let w=0;w<8;w++){
    const mon=new Date(); mon.setDate(mon.getDate()-mon.getDay()+1-w*7);
    const sun=new Date(mon); sun.setDate(sun.getDate()+6);
    const monStr=mon.toISOString().split('T')[0];
    const sunStr=sun.toISOString().split('T')[0];
    const total=tasks.filter(t=>t.created>=monStr&&t.created<=sunStr).length;
    const done =tasks.filter(t=>t.done&&t.completedDate>=monStr&&t.completedDate<=sunStr).length;
    if(total>0||done>0) weeks.push({monStr,sunStr,total,done,mon,sun});
  }
  if(!weeks.length){el.innerHTML='<div class="empty">還沒有足夠的資料</div>';return;}
  el.innerHTML=weeks.map(w=>{
    const rate=w.total?Math.round(w.done/w.total*100):0;
    const monLabel=w.mon.toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});
    const sunLabel=w.sun.toLocaleDateString('zh-TW',{month:'numeric',day:'numeric'});
    const color=rate>=80?'var(--green)':rate>=50?'var(--gold)':'var(--red)';
    return `<div class="week-card">
      <div class="week-header">
        <span class="week-title">${monLabel} – ${sunLabel}</span>
        <span class="week-rate" style="color:${color}">${rate}%</span>
      </div>
      <div style="font-size:12px;color:var(--dim);margin-bottom:6px">建立 ${w.total} 項・完成 ${w.done} 項</div>
      <div class="prog-wrap"><div class="prog-bar" style="width:${rate}%;background:${color}"></div></div>
    </div>`;
  }).join('');
}

// ── GOALS ──
function swGoalTab(t){
  ['annual','quarter','ghistory'].forEach((n,i)=>{
    document.getElementById('gs-'+n).classList.toggle('on',n===t);
    document.querySelectorAll('.gtab')[i].classList.toggle('on',n===t);
  });
  if(t==='ghistory') renderGHistory();
}
function renderGoals(){ renderGoalList('annual'); renderGoalList('quarter'); }
function renderGoalList(layer){
  const items=goals.filter(g=>g.layer===layer);
  const el=document.getElementById('gl-'+layer);
  if(!items.length){el.innerHTML=`<div class="empty">尚無${layer==='annual'?'年度':'季度'}目標</div>`;return;}
  el.innerHTML=items.map(g=>goalHTML(g)).join('');
}
function goalHTML(g){
  const ll=g.layer==='annual'?'📅 年度':'📆 季度';
  return `<div class="gitem${g.active===false?' disabled':''}" id="gi-${g.id}">
    <button class="gtoggle${g.active!==false?' on':''}" onclick="toggleGoal(${g.id})"></button>
    <div class="gbody">
      <div class="gtext" id="gt-${g.id}">${esc(g.text)}</div>
      <div class="glayer">${ll} · 建立 ${g.created}${g.edited?' · 編輯 '+g.edited:''}</div>
      <div class="gactions"><button class="bsm" onclick="startEdit(${g.id})">✏️ 編輯</button><button class="bdanger" onclick="deleteGoal(${g.id})">刪除</button></div>
    </div>
  </div>`;
}
function showAddGoal(){ document.getElementById('add-goal-form').style.display='block'; document.getElementById('new-goal-text').focus(); }
function cancelAddGoal(){ document.getElementById('add-goal-form').style.display='none'; document.getElementById('new-goal-text').value=''; }
function confirmAddGoal(){
  const txt=document.getElementById('new-goal-text').value.trim();
  const layer=document.getElementById('new-goal-layer').value;
  if(!txt) return;
  const g={id:Date.now(),text:txt,layer,active:true,created:new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'})};
  goals.push(g); saveG();
  recordGH('add',`新增${layer==='annual'?'年度':'季度'}目標：${txt.slice(0,30)}`);
  cancelAddGoal(); renderGoals(); swGoalTab(layer); toast('✓ 目標已新增');
}
function toggleGoal(id){
  const g=goals.find(x=>x.id===id); if(!g) return;
  g.active=g.active===false;
  saveG(); recordGH('toggle',`${g.active?'啟用':'停用'}：${g.text.slice(0,30)}`);
  renderGoals(); toast(g.active?'✓ 已啟用':'已停用');
}
function deleteGoal(id){
  const g=goals.find(x=>x.id===id); if(!g||!confirm('確定刪除？')) return;
  recordGH('del',`刪除：${g.text.slice(0,30)}`);
  goals=goals.filter(x=>x.id!==id); saveG(); renderGoals(); toast('已刪除');
}
function startEdit(id){
  const g=goals.find(x=>x.id===id); if(!g) return;
  const el=document.getElementById('gt-'+id);
  el.innerHTML=`<textarea class="gedit-input" id="gedit-${id}" oninput="ar(this)">${esc(g.text)}</textarea>
    <div style="display:flex;gap:6px;margin-top:6px">
      <button class="bsm" onclick="confirmEdit(${id})">儲存</button>
      <button class="bsm" onclick="renderGoals()">取消</button>
    </div>`;
  const ta=document.getElementById('gedit-'+id); ar(ta); ta.focus();
}
function confirmEdit(id){
  const g=goals.find(x=>x.id===id); if(!g) return;
  const newText=document.getElementById('gedit-'+id).value.trim(); if(!newText) return;
  const old=g.text; g.text=newText;
  g.edited=new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'});
  recordGH('edit',`編輯：「${old.slice(0,20)}」→「${newText.slice(0,20)}」`);
  saveG(); renderGoals(); toast('✓ 已更新');
}
function recordGH(type,desc){
  ghistory.unshift({date:new Date().toLocaleString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}),type,desc});
  if(ghistory.length>50) ghistory=ghistory.slice(0,50);
  saveGH();
}
function renderGHistory(){
  const el=document.getElementById('gl-ghistory');
  if(!ghistory.length){el.innerHTML='<div class="empty">尚無修改紀錄</div>';return;}
  const groups={};
  ghistory.forEach(h=>{const d=h.date.split(' ')[0];if(!groups[d])groups[d]=[];groups[d].push(h);});
  el.innerHTML=Object.entries(groups).map(([date,items])=>`
    <div class="vitem">
      <div class="vdate">${date}</div>
      <div class="vchanges">${items.map(h=>{
        const cls=h.type==='add'?'vc-add':h.type==='edit'?'vc-edit':h.type==='del'?'vc-del':'vc-toggle';
        const icon=h.type==='add'?'＋':h.type==='edit'?'✏':h.type==='del'?'✕':'⏻';
        return `<div class="${cls}">${icon} ${esc(h.desc)} <span style="color:var(--faint);font-size:10px">${h.date.split(' ')[1]||''}</span></div>`;
      }).join('')}</div>
    </div>`).join('');
}

// ── Analysis preview ──
function updateAnalysisPreview(){
  const active=goals.filter(g=>g.active!==false);
  const el=document.getElementById('active-goals-preview');
  if(!el) return;
  if(!active.length){el.innerHTML='<div style="font-size:12px;color:var(--red);padding:8px;background:#fce8e8;border-radius:8px">⚠ 尚未設定啟用中的目標</div>';return;}
  el.innerHTML=`<div style="font-size:11px;color:var(--dim);margin-bottom:6px">啟用目標（${active.length} 條）：</div>`+
    active.map(g=>`<div style="font-size:12px;color:var(--text);padding:4px 0;border-bottom:1px solid var(--faint);line-height:1.5">
      <span style="color:${g.layer==='annual'?'var(--gold)':'var(--blue)'}">${g.layer==='annual'?'📅':'📆'}</span> ${esc(g.text)}
    </div>`).join('');
}

// ── AI Analysis ──
async function runAnalysis(){
  const btn=document.getElementById('abtn'),abox=document.getElementById('abox'),atxt=document.getElementById('atext');
  const active=goals.filter(g=>g.active!==false);
  if(!tasks.length){toast('⚠ 請先新增任務');return;}
  if(!active.length){toast('⚠ 請先設定啟用中的目標');return;}
  btn.disabled=true;btn.textContent='分析中…';
  abox.classList.add('vis');
  atxt.innerHTML='<div class="dots"><span>●</span><span>●</span><span>●</span></div>';
  const annual=active.filter(g=>g.layer==='annual').map(g=>`・${g.text}`).join('\n');
  const quarter=active.filter(g=>g.layer==='quarter').map(g=>`・${g.text}`).join('\n');
  const goalBlock=(annual?`【年度目標】\n${annual}\n`:'')+(quarter?`【季度重點】\n${quarter}`:'');
  const lines=(label,arr)=>arr.length?label+'\n'+arr.map(t=>`  [${t.id}] ${t.text}${t.dueDate?` (截止:${t.dueDate})`:''}`).join('\n'):'';
  const u=tasks.filter(t=>t.priority==='urgent'&&!t.done);
  const w=tasks.filter(t=>t.priority==='week'&&!t.done);
  const l=tasks.filter(t=>t.priority==='later'&&!t.done);
  const d=tasks.filter(t=>t.done);
  const taskBlock=[lines('🔴 今天必做：',u),lines('🟡 本週要做：',w),lines('⚪ 有空再說：',l),lines('✓ 已完成：',d)].filter(Boolean).join('\n\n');
  const prompt=`你是一位台灣貿易公司的業務顧問。

${goalBlock}

【今日任務清單（每項有 ID，部分有截止日期）】
${taskBlock}

請做以下三件事：

一、逐項分析（只分析未完成的任務）
每一項用以下固定格式：
任務 [ID]：<任務文字>
→ 性質：📋 任務（有目的、推進業務結果）/ 📝 待辦（零碎執行、處理完即可）
→ 對齊狀態：✓ 對齊目標 / ⚠ 需調整 / ～ 無直接關聯
→ 備注：一句說明（30字內）
→ 調整建議：如果是「需調整」或「待辦但應升級為任務」，給一句具體建議；其他情況省略

二、今日行動建議
列出今天最優先做的 3 件事（考慮截止日期與目標關聯性），說明理由。

三、整體觀察
2-3 句話，說明目前清單裡任務與待辦的比例是否合理，以及結構性問題或機會點。

語氣直接、實用，繁體中文。`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1400,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const raw=(data.content||[]).map(b=>b.text||'').join('');
    parseAlignment(raw); atxt.textContent=raw; renderAll();
  }catch(e){atxt.textContent='分析失敗，請確認網路後重試。';}
  btn.disabled=false;btn.textContent='🧠 開始分析';
}
function parseAlignment(text){
  const lines=text.split('\n'); let curId=null;
  for(let line of lines){
    const idm=line.match(/任務\s*\[(\d+)\]/); if(idm) curId=parseInt(idm[1]);
    if(!curId) continue;
    const t=tasks.find(x=>x.id===curId); if(!t) continue;
    if(line.includes('✓ 對齊目標')) t.align='yes';
    else if(line.includes('⚠ 需調整')) t.align='no';
    else if(line.includes('～ 無直接關聯')) t.align='na';
    const nm=line.match(/備注[：:]\s*(.+)/); if(nm) t.alignNote=nm[1].trim();
  }
  save();
}
